name: Deploy to VPS

on:
  push:
    branches:
      - main  # أو اسم الفرع الذي تريد الرفع منه

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_PRIVATE_KEY }}
        port: 22
        # تمرير المتغيرات السرية لاستخدامها داخل السكريبت
        envs: VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY
        script: |
          # 1. الذهاب لمجلد المشروع
          cd /var/jadwala/jadwala-w

          # 2. سحب أحدث التغييرات
          git pull origin main

          # 3. بناء الصورة (Image) داخل السيرفر
          # نمرر المتغيرات هنا لكي يتم تضمينها في Vite Build
          docker build \
            --build-arg VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }} \
            --build-arg VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }} \
            -t schedule-smart-app .

          # 4. إيقاف وحذف الحاوية القديمة (إن وجدت)
          docker stop jadwala-container || true
          docker rm jadwala-container || true

          # 5. تشغيل الحاوية الجديدة
          # ربط المنفذ 8001 (سيرفر) بالمنفذ 80 (داخلي)
          docker run -d \
            --name jadwala-container \
            --restart unless-stopped \
            -p 8001:80 \
            schedule-smart-app