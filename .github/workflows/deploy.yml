name: Deploy Jadwala to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_PRIVATE_KEY }}
        port: 22
        # تمرير المتغيرات السرية لاستخدامها داخل السكريبت
        envs: VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY
        script: |
          # 1. الذهاب لمسار المشروع الجديد
          cd /var/jadwala/jadwala-w

          # 2. سحب أحدث التغييرات من GitHub
          git pull origin main

          # 3. بناء الصورة (Image) داخل السيرفر مع تمرير المتغيرات
          docker build --no-cache \
            --build-arg VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }} \
            --build-arg VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }} \
            -t jadwala-image .

          # 4. إيقاف وحذف الحاوية القديمة (jadwala-container)
          docker stop jadwala-container || true
          docker rm jadwala-container || true

          # 5. تشغيل الحاوية الجديدة
          # المنفذ الخارجي 8001 يوجه للمنفذ الداخلي 80
          docker run -d \
            --name jadwala-container \
            --restart unless-stopped \
            -p 8001:80 \
            jadwala-image